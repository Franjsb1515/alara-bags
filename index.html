<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alara Bags</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Jost:wght@300;400;500&family=Mulish:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--primario:#5d4435;--secundario:#c8d3aa;--fondo:#f7f5ee;--papel:#fffefa;--verde:#6f7a52;--texto:#4a382c;--gris:#9a8d7c;--linea:#ece7da;--tit:'Cormorant Garamond';--cuerpo:'Mulish';}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--cuerpo),sans-serif;background:var(--fondo);color:var(--texto);line-height:1.6}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
h1,h2,h3{font-family:var(--tit),Georgia,serif;font-weight:600;color:var(--primario);line-height:1.1}
.wrap{max-width:1180px;margin:0 auto;padding:0 22px}
.btn{display:inline-block;border:none;border-radius:999px;padding:12px 26px;font-family:var(--cuerpo);font-size:13px;font-weight:600;letter-spacing:.5px;cursor:pointer;transition:.2s}
.btn-p{background:var(--primario);color:#fff}.btn-p:hover{opacity:.9}
.btn-o{background:transparent;border:1px solid var(--primario);color:var(--primario)}.btn-o:hover{background:var(--primario);color:#fff}
.btn-wa{background:var(--verde);color:#fff;display:inline-flex;align-items:center;gap:7px}.btn-wa:hover{opacity:.92}
/* Header */
header{position:sticky;top:0;z-index:30;background:rgba(255,254,250,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--linea)}
.hd{display:flex;align-items:center;justify-content:space-between;padding:14px 0}
.brand{font-family:var(--tit);font-size:30px;color:var(--primario);line-height:.9}
.brand small{display:block;font-family:var(--cuerpo);font-size:9px;letter-spacing:4px;color:var(--verde)}
nav.menu{display:flex;gap:26px;align-items:center;font-size:13px;letter-spacing:1px;text-transform:uppercase}
nav.menu a{color:var(--texto);opacity:.8}nav.menu a:hover{opacity:1}
/* Hero */
.hero{margin:22px 0}.hero-in{background:var(--secundario);border-radius:20px;padding:70px 20px;text-align:center;position:relative;overflow:hidden}
.hero-in h1{font-size:clamp(52px,9vw,120px)}
.hero-in .sub{letter-spacing:6px;font-size:13px;color:var(--verde);margin:2px 0 18px}
.hero-in p.lead{max-width:520px;margin:0 auto 26px;color:var(--primario);font-size:17px}
.hero-in .circ{position:absolute;border-radius:50%;background:rgba(255,255,255,.25)}
.circ1{width:260px;height:260px;right:-60px;top:-60px}.circ2{width:200px;height:200px;left:-50px;bottom:-70px}
/* Catalogo */
.sec-tit{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gris)}
.filtros{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0 26px}
.chip{border:1px solid var(--linea);background:#fff;border-radius:999px;padding:8px 18px;font-size:13px;cursor:pointer;transition:.15s;text-transform:capitalize}
.chip.on,.chip:hover{background:var(--primario);color:#fff;border-color:var(--primario)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:26px}
.card-p{background:var(--papel);border:1px solid var(--linea);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;cursor:pointer;transition:.2s}
.card-p:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(93,68,53,.1)}
.cover{aspect-ratio:1;background:#f1eee3;display:flex;align-items:center;justify-content:center;position:relative}
.cover img{width:100%;height:100%;object-fit:cover}
.cover .nofoto{font-family:'Jost';font-size:11px;letter-spacing:2px;color:#b3a48f}
.badge{position:absolute;top:12px;left:12px;background:var(--primario);color:#fff;font-size:10px;letter-spacing:1px;padding:4px 10px;border-radius:999px;text-transform:uppercase}
.badge.promo{background:var(--verde)} .badge.ago{background:#b5654a}
.card-b{padding:15px}
.card-b .cat{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--verde)}
.card-b h3{font-size:22px;margin:3px 0 6px}
.precio{font-size:17px;font-weight:700;color:var(--primario)}.precio s{color:var(--gris);font-weight:400;font-size:14px;margin-left:6px}
.dots{display:flex;gap:5px;margin-top:9px}.dot{width:15px;height:15px;border-radius:50%;border:1px solid rgba(0,0,0,.1)}
/* Secciones info */
.info{background:var(--papel);border-top:1px solid var(--linea);margin-top:60px;padding:50px 0}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:26px}
.info-card h3{font-size:24px;margin-bottom:6px}.info-card p{color:var(--gris);font-size:14px}
.faq{max-width:760px;margin:44px auto 0}
.faq-item{border-bottom:1px solid var(--linea)}
.faq-q{padding:16px 0;font-weight:600;cursor:pointer;display:flex;justify-content:space-between}
.faq-a{max-height:0;overflow:hidden;transition:.25s;color:var(--gris)}.faq-a.open{max-height:300px;padding-bottom:16px}
footer{background:var(--primario);color:#e9ddcf;padding:40px 0;text-align:center}
footer .brand{color:#fff}footer a{color:var(--secundario);margin:0 8px}
/* Modal */
.ov{position:fixed;inset:0;background:rgba(45,34,26,.55);display:none;align-items:flex-start;justify-content:center;padding:24px 14px;overflow:auto;z-index:60}
.ov.open{display:flex}
.det{background:var(--papel);border-radius:16px;max-width:900px;width:100%;overflow:hidden}
.det-grid{display:grid;grid-template-columns:1fr 1fr}
.det-media{background:#f1eee3}
.det-media .big{aspect-ratio:1;width:100%;object-fit:cover;background:#f1eee3}
.det-media video.big{object-fit:cover}
.det-thumbs{display:flex;gap:8px;padding:10px;flex-wrap:wrap}
.det-thumbs img,.det-thumbs video{width:56px;height:56px;object-fit:cover;border-radius:7px;border:2px solid transparent;cursor:pointer}
.det-thumbs .sel{border-color:var(--primario)}
.det-info{padding:26px}
.det-info .cat{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--verde)}
.det-info h2{font-size:32px;margin:4px 0 10px}
.det-precio{font-size:24px;font-weight:700;color:var(--primario);margin-bottom:14px}.det-precio s{font-size:17px;color:var(--gris);font-weight:400;margin-left:8px}
.det-info .fila{display:flex;gap:8px;font-size:14px;margin:5px 0;color:var(--texto)}.det-info .fila b{color:var(--primario)}
.cerrar{position:absolute;top:16px;right:18px;background:rgba(0,0,0,.4);color:#fff;border:none;border-radius:50%;width:34px;height:34px;font-size:16px;cursor:pointer;z-index:2}
@media(max-width:720px){.det-grid,.info-grid{grid-template-columns:1fr}nav.menu a:not(.solo){display:none}.hero-in{padding:48px 16px}}

.muted{color:var(--gris);font-size:13px}
.cart-btn{display:inline-flex;align-items:center;gap:5px;font-size:15px;background:var(--primario);color:#fff;padding:8px 15px;border-radius:999px;cursor:pointer}
.cart-btn #cartCount{background:#fff;color:var(--primario);border-radius:999px;min-width:19px;height:19px;font-size:11px;font-weight:700;display:none;align-items:center;justify-content:center;padding:0 5px}
.det-colores{margin:12px 0}.det-colores label{display:block;font-size:13px;font-weight:600;color:var(--primario);margin-bottom:6px}
.col-opts{display:flex;gap:8px;flex-wrap:wrap}
.col-opt{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--linea);background:#fff;border-radius:999px;padding:6px 12px;font-size:13px;cursor:pointer;color:var(--texto)}
.col-opt:hover{border-color:var(--primario)}.col-opt.sel{border-color:var(--primario);background:var(--primario);color:#fff}
.col-sw{width:14px;height:14px;border-radius:50%;border:1px solid rgba(0,0,0,.15)}
.det-desc{color:var(--gris);margin-bottom:12px}
.det-compra{display:flex;gap:10px;align-items:center;margin-top:18px;flex-wrap:wrap}
.qty-sel{display:inline-flex;align-items:center;border:1px solid var(--linea);border-radius:999px;overflow:hidden}
.qty-sel button{background:#fff;border:none;width:34px;height:38px;font-size:18px;cursor:pointer;color:var(--primario)}
.qty-sel span{min-width:30px;text-align:center;font-weight:600}
.qty-sel.sm button{width:26px;height:28px;font-size:15px}
.nofoto-big{aspect-ratio:1;display:flex;align-items:center;justify-content:center;color:#b3a48f;font-family:'Jost'}
.cart-ov{position:fixed;inset:0;background:rgba(45,34,26,.5);display:none;justify-content:flex-end;z-index:70}
.cart-ov.open{display:flex}
.cart-panel{background:var(--papel);width:100%;max-width:400px;height:100%;display:flex;flex-direction:column;box-shadow:-8px 0 30px rgba(0,0,0,.2)}
.cart-head{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--linea)}
.cart-head button{background:none;border:none;font-size:20px;cursor:pointer;color:var(--gris)}
.cart-body{flex:1;overflow:auto;padding:14px 20px}
.cart-empty{color:var(--gris);text-align:center;margin-top:40px}
.cart-it{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;padding:12px 0;border-bottom:1px solid var(--linea)}
.cart-x{background:none;border:none;color:var(--gris);cursor:pointer;font-size:14px}
.cart-foot{padding:18px 20px;border-top:1px solid var(--linea)}
.cart-total{display:flex;justify-content:space-between;font-size:18px;margin-bottom:12px}.cart-total b{color:var(--primario)}
.cart-foot .btn{width:100%;text-align:center}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--primario);color:#fff;padding:11px 20px;border-radius:999px;font-size:14px;opacity:0;transition:.25s;z-index:100;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:720px){.cart-panel{max-width:100%}}

.det-media .big{cursor:zoom-in}
.zoom-ov{position:fixed;inset:0;background:rgba(20,15,12,.93);display:none;align-items:center;justify-content:center;z-index:90;overflow:hidden;cursor:zoom-out}
.zoom-ov.open{display:flex}
.zoom-ov img{max-width:92vw;max-height:86vh;transform-origin:center;transition:transform .04s linear;cursor:grab;user-select:none;-webkit-user-drag:none}
.zoom-ov img:active{cursor:grabbing}
.zoom-close{position:fixed;top:18px;right:20px;background:rgba(255,255,255,.16);color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;z-index:2}
.zoom-ctrls{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:2}
.zoom-ctrls button{background:rgba(255,255,255,.16);color:#fff;border:none;border-radius:9px;width:46px;height:42px;font-size:22px;cursor:pointer}
</style>
</head>
<body>
<header><div class="wrap hd">
  <a href="#" class="brand" id="brandNombre">Alara<small id="brandSub">BAGS</small></a>
  <nav class="menu">
    <a href="#catalogo">Tienda</a><a href="#faq">Preguntas</a><a href="#contacto">Contacto</a>
    <a href="#" class="cart-btn" id="cartBtn">🛒 <span id="cartCount">0</span></a>
  </nav>
</div></header>

<main class="wrap">
  <section class="hero"><div class="hero-in">
    <span class="circ circ1"></span><span class="circ circ2"></span>
    <h1 id="heroTitulo">Alara</h1>
    <div class="sub" id="heroSub2">BAGS</div>
    <p class="lead" id="heroSub">Bolsos, mochilas, carteras y accesorios.</p>
    <div><a href="#catalogo" class="btn btn-p" id="btnHero1">Ver catálogo</a>
    <a href="#" class="btn btn-o" id="btnHero2">Escribinos</a></div>
  </div></section>

  <section id="catalogo" style="margin-top:30px">
    <div class="sec-tit">Catálogo</div>
    <h2 id="catTitulo" style="font-size:38px">Nuestra colección</h2>
    <div class="filtros" id="filtros"></div>
    <div class="grid" id="grid"></div>
  </section>
</main>

<section class="info" id="info"><div class="wrap">
  <div class="info-grid">
    <div class="info-card"><h3>Envíos</h3><p id="txtEnvio"></p></div>
    <div class="info-card"><h3>Cambios</h3><p id="txtCambios"></p></div>
    <div class="info-card"><h3>Devoluciones</h3><p id="txtDev"></p></div>
  </div>
  <div id="faq" class="faq"><h2 style="text-align:center;font-size:34px">Preguntas frecuentes</h2><div id="faqList"></div></div>
</div></section>

<footer id="contacto"><div class="wrap">
  <div class="brand" style="font-size:34px">Alara</div>
  <p style="margin:10px 0" id="footContacto"></p>
  <div id="footRedes" style="margin:12px 0"></div>
  <a href="#" class="btn btn-wa" id="waFoot">Escribinos por WhatsApp</a>
  <p style="margin-top:20px;font-size:12px;opacity:.7">© <span id="anio"></span> Alara Bags</p>
</div></footer>

<div class="ov" id="ov"><div class="det" style="position:relative"><button class="cerrar" id="cerrar">✕</button><div id="detCont"></div></div></div>
<div class="cart-ov" id="cartOv"><div class="cart-panel">
  <div class="cart-head"><h3>Tu carrito</h3><button id="cartClose">✕</button></div>
  <div class="cart-body" id="cartBody"></div>
  <div class="cart-foot" id="cartFoot"><div class="cart-total">Total <b id="cartTotal">$0</b></div>
    <button class="btn btn-wa" id="cartCheckout">Finalizar pedido por WhatsApp</button></div>
</div></div>
<div class="zoom-ov" id="zoomOv">
  <button class="zoom-close" id="zoomClose">✕</button>
  <div class="zoom-ctrls"><button id="zoomOut">−</button><button id="zoomIn">+</button></div>
  <img id="zoomImg" alt="">
</div>
<div class="toast" id="toast"></div>
<script src="/app.js"></script>
</body>
</html>
